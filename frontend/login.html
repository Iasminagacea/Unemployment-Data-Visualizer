<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Login - UnD Admin</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4;}
        .login-box { background: white; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Autentificare Admin</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Utilizator:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label>Parolă:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Intră</button>
        </form>
        <p id="loginMessage" style="color: red;"></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);

            fetch('../backend/api/login.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    window.location.href = 'admin.html'; 
                } else {
                    document.getElementById('loginMessage').innerText = "Date incorecte!";
                }
            });
        });
    </script>
</body>
</html>
